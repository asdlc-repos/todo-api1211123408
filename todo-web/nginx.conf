worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  keepalive_timeout 65;
  server_tokens off;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  # Nginx writes temp files here; /tmp is writable under any user in the alpine image.
  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint
    location = /health {
      access_log off;
      add_header Content-Type text/plain;
      return 200 'ok';
    }

    # Never cache index.html so new deploys are picked up immediately
    location = /index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate";
      try_files $uri =404;
    }

    # Long-cache hashed assets emitted by Vite
    location /assets/ {
      access_log off;
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }

    # SPA fallback: serve index.html for anything not matching a file
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
